stages:
  - deploy

variables:
  VM_HOST: "2262-cse115b-02.be.ucsc.edu"
  VM_USER: "pmundra"
  DEPLOY_PATH: "/home/pmundra/slug-mcp"

deploy:
  stage: deploy
  image: alpine:3.20
  tags:
    - docker
    - linux
  before_script:
    - apk add --no-cache openssh-client curl ca-certificates
    - mkdir -p ~/.ssh
    - cp "${SSH_PRIVATE_KEY}" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - cat "${VM_HOST_KEY}" > ~/.ssh/known_hosts
  script:
    - |
      ssh -o BatchMode=yes -o StrictHostKeyChecking=yes \
        "${VM_USER}@${VM_HOST}" \
        "cd '${DEPLOY_PATH}' && DEPLOY_BRANCH='${CI_COMMIT_BRANCH}' ./deploy.sh"
    - curl -fsSI --max-time 15 "https://${VM_HOST}/healthz"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
