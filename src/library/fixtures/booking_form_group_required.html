<!--
  The patron booking form fragment returned by LibCal's /ajax/space/times once
  authenticated. This variant gates submission on a REQUIRED group-name question
  (the field LibCal labels "Group / Meeting Name"). parse_booking_form must:
    - fill that field from the supplied group_name (and then NOT flag it missing),
    - auto-agree the required terms checkbox,
    - pick the first non-empty <select> option,
    - carry hidden fields through verbatim.
  When no group_name is supplied, the required group field is reported missing.
-->
<div id="s-lc-rm-bk">
  <form action="/ajax/space/book" method="post" class="s-lc-bookings-form">
    <input type="hidden" name="iid" value="998" />
    <input type="hidden" name="session" value="se55ionABC" />

    <label for="fname">First Name</label>
    <input type="text" name="fname" id="fname" value="Sammy" required />

    <label for="lname">Last Name</label>
    <input type="text" name="lname" id="lname" value="Slug" required />

    <label for="email">Email</label>
    <input type="email" name="email" id="email" value="sammy@ucsc.edu" required />

    <label for="q12345">Group / Meeting Name</label>
    <input type="text" name="q12345" id="q12345" value="" class="form-control required" aria-required="true" required />

    <label for="q67890">Expected Party Size</label>
    <select name="q67890" id="q67890" required>
      <option value="">Please choose…</option>
      <option value="2-4">2-4 people</option>
      <option value="5-8">5-8 people</option>
    </select>

    <label for="terms">I agree to the study room policy</label>
    <input type="checkbox" name="terms" id="terms" value="agreed" required />

    <button type="submit" name="submit" value="go">Submit my Booking</button>
  </form>
</div>
